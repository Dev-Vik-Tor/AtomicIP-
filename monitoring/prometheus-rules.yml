groups:
  - name: atomicip_alerts
    interval: 30s
    rules:
      # Critical Alerts
      - alert: APIDown
        expr: up{job="atomicip-api"} == 0
        for: 1m
        labels:
          severity: critical
          component: api
        annotations:
          summary: "AtomicIP API is down"
          description: "API server {{ $labels.instance }} has been unreachable for 1 minute"
          runbook: "https://docs.atomicip.io/monitoring-runbook#apidown"

      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.05
        for: 5m
        labels:
          severity: critical
          component: api
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value | humanize }} errors/sec on {{ $labels.instance }}"
          runbook: "https://docs.atomicip.io/monitoring-runbook#higherrorrate"

      - alert: ContractPaused
        expr: contract_paused == 1
        for: 1m
        labels:
          severity: warning
          component: contract
        annotations:
          summary: "Contract is paused"
          description: "Atomic swap contract has been paused"
          runbook: "https://docs.atomicip.io/monitoring-runbook#contractpaused"

      # Warning Alerts
      - alert: HighLatency
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 2
        for: 10m
        labels:
          severity: warning
          component: api
        annotations:
          summary: "API latency is elevated"
          description: "P95 latency is {{ $value | humanizeDuration }} on {{ $labels.instance }}"
          runbook: "https://docs.atomicip.io/monitoring-runbook#highlatency"

      - alert: LowCompletionRate
        expr: rate(atomic_swap_completed[1h]) / rate(atomic_swap_total[1h]) < 0.7
        for: 30m
        labels:
          severity: warning
          component: contract
        annotations:
          summary: "Swap completion rate is low"
          description: "Only {{ $value | humanizePercentage }} of swaps are completing successfully"
          runbook: "https://docs.atomicip.io/monitoring-runbook#lowcompletionrate"

      - alert: HighMemoryUsage
        expr: process_resident_memory_bytes / 1024 / 1024 > 1024
        for: 5m
        labels:
          severity: warning
          component: api
        annotations:
          summary: "High memory usage"
          description: "API server {{ $labels.instance }} is using {{ $value | humanize }}MB of memory"

      - alert: HighSwapCancellationRate
        expr: rate(atomic_swap_cancelled[1h]) / rate(atomic_swap_total[1h]) > 0.3
        for: 30m
        labels:
          severity: warning
          component: contract
        annotations:
          summary: "High swap cancellation rate"
          description: "{{ $value | humanizePercentage }} of swaps are being cancelled"
